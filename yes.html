<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wait...</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  overflow: hidden;
}

/* overlay */
#fade {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  transition:1.5s;
  z-index:5;
}

/* text */
#text {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  width:80%;
  max-width:600px;
  text-align:center;
  line-height:1.7;
  font-size:18px;
  opacity:0;
  z-index:10;
}

/* buttons */
#buttons {
  position: fixed;
  bottom:12%;
  width:100%;
  text-align:center;
  opacity:0;
  z-index:10;
}
</style>
</head>

<body>

<!-- FUN SCREEN -->
<div class="container" id="fun">
  <h1>So finally… YES? 😄</h1>
  <div class="btn">
    <button id="yesStartBtn">YES ❤️</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="fade"></div>

<!-- TEXT -->
<div id="text"></div>

<!-- FINAL BUTTONS -->
<div id="buttons" class="btn">
  <button onclick="yesClick()">YES ❤️</button>
  <button onclick="noClick()">NO 💔</button>
</div>

<audio id="music" src="audio.mp3"></audio>

<script src="script.js"></script>
<script src="vfx.js"></script>

</body>
</html>
