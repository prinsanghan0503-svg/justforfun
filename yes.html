<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wait...</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  overflow: hidden;
}

/* Fade overlay */
#fade {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  transition:1.5s;
  z-index:5;
}

/* Message text */
#text {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  width:80%;
  max-width:600px;
  text-align:center;
  line-height:1.7;
  font-size:18px;
  opacity:0;
  z-index:10;
}

/* Final buttons */
#buttons {
  position: fixed;
  bottom:12%;
  width:100%;
  text-align:center;
  opacity:0;
  z-index:10;
}
</style>
</head>

<body>

<!-- FUN SCREEN -->
<div class="container" id="fun">
  <h1>So finally… YES? 😄</h1>
  <div class="btn">
    <!-- IMPORTANT FIX -->
    <button onclick="startSerious()">YES ❤️</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="fade"></div>

<!-- MESSAGE -->
<div id="text"></div>

<!-- FINAL YES / NO -->
<div id="buttons" class="btn">
  <button onclick="yesClick()">YES ❤️</button>
  <button onclick="noClick()">NO 💔</button>
</div>

<audio id="music" src="audio.mp3"></audio>

<script>
// ===== FINAL SCRIPT (WORKING) =====

const message = `Hey… wait ❤️

I know this whole thing was a bit fun and tricky 😅  
But now, I want to be completely real with you.

Sorry if this felt like I forced the moment… that was never my intention.

So let me ask you properly this time—

Do you genuinely feel the same way?

You can say YES or NO.  
Whatever your answer is, I will accept it with full respect.

Just honesty 💫`;

function startSerious() {
  const fun = document.getElementById("fun");
  const fade = document.getElementById("fade");
  const text = document.getElementById("text");
  const music = document.getElementById("music");

  fun.style.display = "none";
  fade.style.opacity = 1;

  text.innerHTML = "";

  setTimeout(() => {
    text.style.opacity = 1;
    typeText(message, text, 28);
    if (music) music.play();
  }, 1200);
}

function typeText(msg, el, speed) {
  let i = 0;

  function typing() {
    if (i < msg.length) {
      el.innerHTML += msg.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      document.getElementById("buttons").style.opacity = 1;
    }
  }

  typing();
}

function yesClick() {
  window.location.href = "yes2.html";
}

function noClick() {
  window.location.href = "noFinal.html";
}
</script>

<script src="vfx.js"></script>

</body>
</html>
