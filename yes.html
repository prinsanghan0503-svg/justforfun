<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wait...</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:'Poppins', sans-serif;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* Fun section */
#fun {
  text-align:center;
}

/* Fade overlay */
#fade {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  transition:1.5s;
  z-index:10;
}

/* Serious text */
#text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:80%;
  max-width:600px;
  line-height:1.7;
  font-size:18px;
  opacity:0;
  transition:1s;
  z-index:20;
}

/* Buttons */
#buttons {
  text-align:center;
  margin-top:30px;
  opacity:0;
  transition:1s;
}

button {
  padding:12px 25px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.yes { background:#00c853; color:white; }
.no { background:#d50000; color:white; }
</style>
</head>

<body>

<!-- FUN PART -->
<div id="fun">
  <h2>So finally… YES? 😄</h2>
  <button onclick="startSerious()">YES ❤️</button>
</div>

<!-- FADE -->
<div id="fade"></div>

<!-- SERIOUS TEXT -->
<div id="text"></div>

<!-- FINAL BUTTONS -->
<div id="buttons">
  <button class="yes" onclick="yesClick()">YES ❤️</button>
  <button class="no" onclick="noClick()">NO 💔</button>
</div>

<audio id="music" src="audio.mp3"></audio>

<script>

const message = `Hey… wait ❤️

I know this whole thing was a bit fun and tricky 😅  
But now, I want to be completely real with you.

Sorry if this felt like I forced the moment… that was never my intention.

So let me ask you properly this time—

Do you genuinely feel the same way?

You can say YES or NO.  
Whatever your answer is, I will accept it with full respect. No pressure. No expectations.

Just honesty 💫`;

function startSerious() {
  const fun = document.getElementById("fun");
  const fade = document.getElementById("fade");
  const text = document.getElementById("text");
  const music = document.getElementById("music");

  // Hide fun part
  fun.style.display = "none";

  // Fade to black
  fade.style.opacity = 1;

  setTimeout(() => {
    text.style.opacity = 1;
    typeText(message, text, 30);
    music.play();
  }, 1200);
}

function typeText(msg, el, speed) {
  let i = 0;
  function typing() {
    if (i < msg.length) {
      el.innerHTML += msg.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      showButtons();
    }
  }
  typing();
}

function showButtons() {
  document.getElementById("buttons").style.opacity = 1;
}

function yesClick() {
  alert("❤️ Thank you... this means a lot to me.");
}

function noClick() {
  alert("I respect your decision. Always.");
}

</script>

</body>
</html>
