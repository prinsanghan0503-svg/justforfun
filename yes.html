<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wait...</title>
<link rel="stylesheet" href="style.css">

<style>
#fade {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  transition:1.5s;
}

#text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:80%;
  max-width:600px;
  line-height:1.7;
  font-size:18px;
  opacity:0;
  transition:1s;
  text-align:center;
}

#buttons {
  text-align:center;
  margin-top:30px;
  opacity:0;
  transition:1s;
}
</style>
</head>

<body>

<!-- FUN PART -->
<div class="container" id="fun">
  <h1>So finally… YES? 😄</h1>
  <div class="btn">
    <button onclick="startSerious()">YES ❤️</button>
  </div>
</div>

<!-- FADE -->
<div id="fade"></div>

<!-- TEXT -->
<div id="text"></div>

<!-- FINAL BUTTONS -->
<div id="buttons" class="btn">
  <button onclick="yesClick()">YES ❤️</button>
  <button onclick="noClick()">NO 💔</button>
</div>

<audio id="music" src="audio.mp3"></audio>

<script src="script.js"></script>
<script src="vfx.js"></script>

</body>
</html>
