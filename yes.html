<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>...</title>
<link rel="stylesheet" href="style.css">

<style>
#fade {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:1; /* start already black */
  z-index:5;
}

#text {
  position: fixed;
  top:40%;
  left:50%;
  transform: translate(-50%, -50%);
  width:80%;
  max-width:600px;
  text-align:center;
  line-height:1.7;
  font-size:18px;
  opacity:0;
  z-index:10;
}

#question {
  position: fixed;
  top:65%;
  width:100%;
  text-align:center;
  font-size:20px;
  opacity:0;
  z-index:10;
}

#buttons {
  position: fixed;
  bottom:10%;
  width:100%;
  text-align:center;
  opacity:0;
  z-index:10;
}
</style>
</head>

<body>

<!-- EMPTY START (no extra screen) -->
<div id="fade"></div>
<div id="text"></div>
<div id="question"></div>

<div id="buttons" class="btn">
  <button onclick="yesClick()">YES ❤️</button>
  <button onclick="noClick()">NO 💔</button>
</div>

<script>

const message = `Hey… wait ❤️

I know this whole thing was a bit fun and tricky 😅  
But now, I want to be completely real with you.

Sorry if this felt like I forced the moment… that was never my intention.`;


const finalQuestion = `Give me an honest reply…

Do you love me?`;


// START AUTOMATICALLY WHEN PAGE LOADS
window.onload = () => {
  startTyping();
};


function startTyping() {
  const text = document.getElementById("text");

  text.style.opacity = 1;

  let i = 0;

  function type() {
    if (i < message.length) {
      text.innerHTML += message.charAt(i);
      i++;
      setTimeout(type, 25);
    } else {
      showQuestion();
    }
  }

  type();
}


function showQuestion() {
  const q = document.getElementById("question");
  q.innerText = finalQuestion;
  q.style.opacity = 1;

  setTimeout(() => {
    document.getElementById("buttons").style.opacity = 1;
  }, 600);
}


function yesClick() {
  window.location.href = "yes2.html";
}

function noClick() {
  window.location.href = "noFinal.html";
}

</script>

<script src="vfx.js"></script>

</body>
</html>
