<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>...</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-8XXSQ7PEGT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-8XXSQ7PEGT');
</script>

<link rel="stylesheet" href="style.css">

<style>
#fade {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  opacity:0;
  transition:1s;
  z-index:5;
}

#text {
  position: fixed;
  top:40%;
  left:50%;
  transform:translate(-50%, -50%);
  width:80%;
  max-width:600px;
  text-align:center;
  opacity:0;
  z-index:10;
}

#question {
  position: fixed;
  top:65%;
  width:100%;
  text-align:center;
  opacity:0;
  z-index:10;
}

#buttons {
  position: fixed;
  bottom:10%;
  width:100%;
  text-align:center;
  opacity:0;
  z-index:10;
}
</style>
</head>

<body>

<div id="fade"></div>
<div id="text"></div>
<div id="question"></div>

<div id="buttons" class="btn">
  <button onclick="yesClick()">YES ❤️</button>
  <button onclick="noClick()">NO 💔</button>
</div>

<script>

const message = `Hey… wait ❤️

I know this whole thing was a bit fun and tricky 😅  
But now, I want to be completely real with you.

Sorry if this felt like I forced the moment… that was never my intention.`;

const finalQuestion = `Give me an honest reply…

Do you love me?`;

// TRACK PAGE OPEN
window.onload = () => {
  if (typeof gtag === "function") {
    gtag('event', 'opened_yes_page');
  }
  startTyping();
};

function startTyping() {
  const text = document.getElementById("text");
  text.style.opacity = 1;

  let i = 0;

  function type() {
    if (i < message.length) {
      text.innerHTML += message.charAt(i);
      i++;
      setTimeout(type, 25);
    } else {
      showQuestion();
    }
  }

  type();
}

function showQuestion() {
  const q = document.getElementById("question");
  q.innerText = finalQuestion;
  q.style.opacity = 1;

  setTimeout(() => {
    document.getElementById("buttons").style.opacity = 1;
  }, 600);
}

// TRACK YES
function yesClick() {
  if (typeof gtag === "function") {
    gtag('event', 'clicked_yes');
  }
  window.location.href = "yes2.html";
}

// TRACK NO
function noClick() {
  if (typeof gtag === "function") {
    gtag('event', 'clicked_no');
  }
  window.location.href = "noFinal.html";
}

</script>

<script src="vfx.js"></script>

</body>
</html>
